name: Auto-send new article to subscribers

on:
  push:
    branches: [main]
    paths:
      - 'content/articles/**.mdx'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect newly added articles
        id: detect
        run: |
          # Get the list of MDX files added or modified in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^content/articles/.*\.mdx$' || true)

          if [ -z "$CHANGED" ]; then
            echo "No new articles in this push. Skipping broadcast."
            echo "should_send=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "New articles detected:"
          echo "$CHANGED"
          echo "should_send=true" >> $GITHUB_OUTPUT

          # Save first changed article for broadcast (one article per push usually)
          FIRST_ARTICLE=$(echo "$CHANGED" | head -1)
          echo "article_path=$FIRST_ARTICLE" >> $GITHUB_OUTPUT

      - name: Extract frontmatter
        if: steps.detect.outputs.should_send == 'true'
        id: fm
        run: |
          FILE="${{ steps.detect.outputs.article_path }}"

          # Extract frontmatter between --- markers (basic YAML parsing)
          FRONTMATTER=$(awk '/^---$/{c++; next} c==1{print}' "$FILE")

          TITLE=$(echo "$FRONTMATTER" | grep -E '^title:' | sed 's/^title:[[:space:]]*//; s/^["'\'']//; s/["'\'']$//')
          SLUG=$(echo "$FRONTMATTER" | grep -E '^slug:' | sed 's/^slug:[[:space:]]*//; s/^["'\'']//; s/["'\'']$//')
          DESCRIPTION=$(echo "$FRONTMATTER" | grep -E '^description:' | sed 's/^description:[[:space:]]*//; s/^["'\'']//; s/["'\'']$//')
          TYPE=$(echo "$FRONTMATTER" | grep -E '^type:' | sed 's/^type:[[:space:]]*//; s/^["'\'']//; s/["'\'']$//')

          # Fallbacks
          [ -z "$SLUG" ] && SLUG=$(basename "$FILE" .mdx)
          [ -z "$TYPE" ] && TYPE="article"

          echo "title=$TITLE"
          echo "slug=$SLUG"
          echo "description=$DESCRIPTION"
          echo "type=$TYPE"

          # Save to step output (multiline safe via heredoc)
          {
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"
            echo "slug<<EOF"
            echo "$SLUG"
            echo "EOF"
            echo "description<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"
            echo "type=$TYPE"
          } >> $GITHUB_OUTPUT

      - name: Trigger broadcast via Vercel API
        if: steps.detect.outputs.should_send == 'true'
        env:
          BROADCAST_URL: ${{ secrets.BROADCAST_API_URL }}
          BROADCAST_TOKEN: ${{ secrets.BROADCAST_API_SECRET }}
        run: |
          echo "📧 Triggering broadcast for: ${{ steps.fm.outputs.title }}"

          PAYLOAD=$(cat <<EOF
          {
            "slug": "${{ steps.fm.outputs.slug }}",
            "title": $(jq -Rs . <<< "${{ steps.fm.outputs.title }}"),
            "description": $(jq -Rs . <<< "${{ steps.fm.outputs.description }}"),
            "type": "${{ steps.fm.outputs.type }}"
          }
          EOF
          )

          curl -X POST "$BROADCAST_URL/api/broadcast" \
            -H "Authorization: Bearer $BROADCAST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --fail-with-body \
            --show-error

          echo "✅ Broadcast triggered. Check Resend dashboard for delivery status."