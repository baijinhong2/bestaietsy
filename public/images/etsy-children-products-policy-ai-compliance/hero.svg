<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Etsy Children Products Policy 2026 AI compliance hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="50%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#3d2960"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a847"/>
      <stop offset="100%" stop-color="#e88a2e"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#ffa94d"/>
      <stop offset="100%" stop-color="#ffd43b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow center -->
  <circle cx="600" cy="315" r="280" fill="url(#glow)"/>

  <!-- Family scene: parent + child silhouette holding hands (centered) -->
  <g transform="translate(450, 200)">
    <!-- Parent silhouette -->
    <g fill="#2d1b4e" opacity="0.95">
      <!-- Head -->
      <circle cx="120" cy="60" r="32"/>
      <!-- Body -->
      <path d="M 80 100 Q 120 92 160 100 L 165 240 Q 120 248 75 240 Z"/>
    </g>
    <!-- Parent outline glow -->
    <g fill="none" stroke="#f4a847" stroke-width="2" opacity="0.5">
      <circle cx="120" cy="60" r="34"/>
      <path d="M 78 102 Q 120 94 162 102 L 167 242 Q 120 250 73 242 Z"/>
    </g>

    <!-- Child silhouette (smaller, holding parent's hand) -->
    <g fill="#3d2960" opacity="0.95">
      <!-- Head -->
      <circle cx="220" cy="140" r="22"/>
      <!-- Body -->
      <path d="M 195 170 Q 220 165 245 170 L 248 240 Q 220 246 192 240 Z"/>
    </g>
    <!-- Child outline glow -->
    <g fill="none" stroke="#ffd43b" stroke-width="1.5" opacity="0.6">
      <circle cx="220" cy="140" r="24"/>
      <path d="M 193 172 Q 220 167 247 172 L 250 242 Q 220 248 190 242 Z"/>
    </g>

    <!-- Hands connecting -->
    <g stroke="#f4a847" stroke-width="3" stroke-linecap="round" opacity="0.7">
      <line x1="158" y1="170" x2="195" y2="180"/>
    </g>

    <!-- Toy block at child's feet (square + triangle) -->
    <g transform="translate(260, 215)">
      <rect x="0" y="0" width="20" height="20" fill="#ff6b6b" opacity="0.8" rx="2"/>
      <polygon points="25,20 35,5 45,20" fill="#ffa94d" opacity="0.8"/>
    </g>
  </g>

  <!-- Vintage-style frame border -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="url(#frame)" stroke-width="3" rx="8"/>
  <rect x="50" y="50" width="1100" height="530" fill="none" stroke="#f4a847" stroke-width="1" opacity="0.4" rx="6"/>

  <!-- Decorative corner flourishes -->
  <g fill="#f4a847" opacity="0.6">
    <circle cx="60" cy="60" r="4"/>
    <circle cx="1140" cy="60" r="4"/>
    <circle cx="60" cy="570" r="4"/>
    <circle cx="1140" cy="570" r="4"/>
  </g>

  <!-- Top badge: 6/2 EFFECTIVE -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="200" height="36" rx="18" fill="#ff6b6b" opacity="0.95"/>
    <text x="100" y="24" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff" letter-spacing="1.5">⚠ 6/2/2026 EFFECTIVE</text>
  </g>

  <!-- Top right badge: 39 DAYS IN -->
  <g transform="translate(920, 90)">
    <rect x="0" y="0" width="200" height="36" rx="18" fill="none" stroke="#ffd43b" stroke-width="1.5"/>
    <text x="100" y="24" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffd43b" letter-spacing="1.5">📅 39 DAYS IN</text>
  </g>

  <!-- AI circuit network overlay (right side) -->
  <g stroke="url(#circuit)" stroke-width="1.5" fill="none" opacity="0.7">
    <!-- Nodes -->
    <circle cx="950" cy="200" r="5" fill="#ffd43b"/>
    <circle cx="1050" cy="180" r="4" fill="#ffa94d"/>
    <circle cx="1000" cy="280" r="6" fill="#ff6b6b"/>
    <circle cx="1100" cy="320" r="4" fill="#ffd43b"/>
    <circle cx="950" cy="400" r="5" fill="#ffa94d"/>
    <circle cx="1080" cy="430" r="4" fill="#ff6b6b"/>
    <circle cx="980" cy="500" r="5" fill="#ffd43b"/>
    <!-- Connections -->
    <line x1="950" y1="200" x2="1050" y2="180"/>
    <line x1="1050" y1="180" x2="1000" y2="280"/>
    <line x1="1000" y1="280" x2="1100" y2="320"/>
    <line x1="1100" y1="320" x2="950" y2="400"/>
    <line x1="950" y1="400" x2="1080" y2="430"/>
    <line x1="1080" y1="430" x2="980" y2="500"/>
    <line x1="1000" y1="280" x2="950" y2="400"/>
    <line x1="950" y1="200" x2="1000" y2="280"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#ffd43b" opacity="0.5">
    <text x="958" y="195">scan</text>
    <text x="1058" y="175">flag</text>
    <text x="1008" y="275">fix</text>
    <text x="1108" y="315">verify</text>
    <text x="958" y="395">audit</text>
  </g>

  <!-- Main title -->
  <g transform="translate(600, 420)">
    <text text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#fff" y="0">Etsy Children Products Policy</text>
    <text text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#f4a847" y="48">5-Step AI Compliance Guide</text>
    <text text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#ffd43b" y="82" opacity="0.9">2026 · 39 Days After 6/2</text>
  </g>

  <!-- Bottom badge: AI Compliance -->
  <g transform="translate(450, 530)">
    <rect x="0" y="0" width="300" height="40" rx="20" fill="#f4a847" opacity="0.95"/>
    <text x="150" y="26" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1a0d2e" letter-spacing="1">🛡 AI-POWERED COMPLIANCE</text>
  </g>
</svg>
