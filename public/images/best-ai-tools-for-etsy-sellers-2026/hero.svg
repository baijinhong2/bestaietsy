<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#F7931E"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative dots pattern -->
  <g fill="#FFFFFF" opacity="0.15">
    <circle cx="100" cy="80" r="4"/>
    <circle cx="180" cy="120" r="3"/>
    <circle cx="80" cy="200" r="5"/>
    <circle cx="220" cy="300" r="4"/>
    <circle cx="1100" cy="100" r="5"/>
    <circle cx="1050" cy="220" r="3"/>
    <circle cx="1100" cy="380" r="4"/>
    <circle cx="1000" cy="500" r="3"/>
  </g>

  <!-- Main content card -->
  <rect x="60" y="80" width="1080" height="470" rx="20" fill="url(#card)"/>

  <!-- Top tag -->
  <rect x="100" y="120" width="220" height="40" rx="20" fill="#FF6B35"/>
  <text x="210" y="147" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">PILLAR GUIDE 2026</text>

  <!-- Main title -->
  <text x="100" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" fill="#1A1A1A">Best AI Tools for Etsy</text>
  <text x="100" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" fill="#1A1A1A">Sellers in 2026</text>

  <!-- Subtitle -->
  <text x="100" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="500" fill="#555555">17 tools tested across listing, SEO, photos, POD, and marketing</text>

  <!-- Stats row -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="100" y="420" font-size="40" font-weight="800" fill="#FF6B35">5</text>
    <text x="135" y="420" font-size="18" fill="#555555">categories</text>

    <text x="240" y="420" font-size="40" font-weight="800" fill="#FF6B35">17</text>
    <text x="290" y="420" font-size="18" fill="#555555">tools tested</text>

    <text x="410" y="420" font-size="40" font-weight="800" fill="#FF6B35">$0</text>
    <text x="465" y="420" font-size="18" fill="#555555">starting price</text>

    <text x="580" y="420" font-size="40" font-weight="800" fill="#FF6B35">13.7×</text>
    <text x="670" y="420" font-size="18" fill="#555555">AI traffic shift</text>
  </g>

  <!-- Tag row -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600">
    <rect x="100" y="465" width="100" height="32" rx="16" fill="#FFE5D9"/>
    <text x="150" y="486" fill="#FF6B35" text-anchor="middle">Listing</text>

    <rect x="210" y="465" width="80" height="32" rx="16" fill="#FFE5D9"/>
    <text x="250" y="486" fill="#FF6B35" text-anchor="middle">SEO</text>

    <rect x="300" y="465" width="120" height="32" rx="16" fill="#FFE5D9"/>
    <text x="360" y="486" fill="#FF6B35" text-anchor="middle">Photography</text>

    <rect x="430" y="465" width="80" height="32" rx="16" fill="#FFE5D9"/>
    <text x="470" y="486" fill="#FF6B35" text-anchor="middle">POD</text>

    <rect x="520" y="465" width="120" height="32" rx="16" fill="#FFE5D9"/>
    <text x="580" y="486" fill="#FF6B35" text-anchor="middle">Marketing</text>
  </g>

  <!-- Right-side tool grid (decorative) -->
  <g transform="translate(800, 110)">
    <text x="160" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1A1A1A" text-anchor="middle">TOP PICKS</text>

    <!-- Tool cards -->
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
      <rect x="0" y="40" width="320" height="50" rx="10" fill="#FF6B35"/>
      <text x="20" y="72" font-size="20" font-weight="800" fill="#FFFFFF">1.</text>
      <text x="60" y="72" font-size="18" font-weight="700" fill="#FFFFFF">Roketfy</text>
      <text x="170" y="72" font-size="13" fill="#FFE5D9">Listing + SEO</text>

      <rect x="0" y="100" width="320" height="50" rx="10" fill="#F7931E"/>
      <text x="20" y="132" font-size="20" font-weight="800" fill="#FFFFFF">2.</text>
      <text x="60" y="132" font-size="18" font-weight="700" fill="#FFFFFF">eRank</text>
      <text x="160" y="132" font-size="13" fill="#FFE5D9">SEO + keyword</text>

      <rect x="0" y="160" width="320" height="50" rx="10" fill="#FF6B35"/>
      <text x="20" y="192" font-size="20" font-weight="800" fill="#FFFFFF">3.</text>
      <text x="60" y="192" font-size="18" font-weight="700" fill="#FFFFFF">Pebblely</text>
      <text x="170" y="192" font-size="13" fill="#FFE5D9">Product photos</text>

      <rect x="0" y="220" width="320" height="50" rx="10" fill="#F7931E"/>
      <text x="20" y="252" font-size="20" font-weight="800" fill="#FFFFFF">4.</text>
      <text x="60" y="252" font-size="18" font-weight="700" fill="#FFFFFF">Midjourney</text>
      <text x="170" y="252" font-size="13" fill="#FFE5D9">POD design</text>

      <rect x="0" y="280" width="320" height="50" rx="10" fill="#FF6B35"/>
      <text x="20" y="312" font-size="20" font-weight="800" fill="#FFFFFF">5.</text>
      <text x="60" y="312" font-size="18" font-weight="700" fill="#FFFFFF">Simplified</text>
      <text x="170" y="312" font-size="13" fill="#FFE5D9">Marketing</text>
    </g>
  </g>
</svg>