      <text x="700" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#10b981" text-anchor="end">9.0</text>
      <rect x="0" y="20" width="700" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
      <rect x="0" y="20" width="630" height="6" rx="3" fill="url(#green)"/>
    </g>

    <!-- Bar 2: Listing Audit 8.5 -->
    <g transform="translate(0, 55)">
      <text x="0" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Listing Audit</text>
      <text x="700" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#10b981" text-anchor="end">8.5</text>
