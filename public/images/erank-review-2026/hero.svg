      <text x="0" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Basic</text>
      <text x="280" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="end">$5.99/mo</text>
      <text x="0" y="32" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#fcd34d" opacity="0.7">Full audit · top-20 sellers</text>
    </g>

    <!-- Pro (highlighted) -->
    <g transform="translate(20, 145)">
      <rect x="-8" y="-6" width="296" height="42" rx="6" fill="#f59e0b" opacity="0.15"/>
      <text x="0" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">Pro ⭐ SWEET SPOT</text>
      <text x="280" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="800" fill="#fbbf24" text-anchor="end">$9.99/mo</text>
      <text x="0" y="32" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fcd34d">Unlimited · top-100 · advanced</text>
    </g>

    <!-- Expert -->
    <g transform="translate(20, 200)">
      <text x="0" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Expert</text>
      <text x="280" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#fcd34d" text-anchor="end">$29.99/mo</text>
      <text x="0" y="32" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#fcd34d" opacity="0.7">Multi-shop · priority</text>
    </g>
  </g>

  <!-- Bottom: 3 corner badges + tagline -->
  <g transform="translate(60, 555)">
    <!-- 1M+ sellers -->
    <rect x="0" y="0" width="180" height="50" rx="10" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
    <text x="90" y="20" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#10b981" text-anchor="middle" letter-spacing="0.5">USED BY</text>
    <text x="90" y="40" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">1M+ sellers</text>

    <!-- Alexa + SimilarWeb #1 -->
    <rect x="195" y="0" width="220" height="50" rx="10" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="305" y="20" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="0.5">ALEXA + SIMILARWEB</text>
    <text x="305" y="40" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">#1 Etsy SEO Tool</text>

    <!-- 7.8/10 aggregate -->
    <rect x="430" y="0" width="170" height="50" rx="10" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="515" y="20" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" text-anchor="middle" letter-spacing="0.5">AGGREGATE SCORE</text>
    <text x="515" y="40" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">7.8 / 10</text>
  </g>

  <!-- Footer: 4 angle corner badges -->
  <g transform="translate(820, 555)">
    <rect x="0" y="0" width="320" height="50" rx="10" fill="none" stroke="#fcd34d" stroke-width="1" opacity="0.5"/>
    <text x="160" y="20" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="700" fill="#fcd34d" text-anchor="middle" letter-spacing="1.5">SEO SPECIALIST · FREE TIER · CHROME EXTENSION · 25% AFFILIATE</text>
    <text x="160" y="40" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#fcd34d" text-anchor="middle" opacity="0.8">Deepest keyword data · Best rank tracking · Pure SEO, no AI</text>
  </g>
</svg>
