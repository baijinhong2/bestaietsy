      <text x="0" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Hot Trending Now</text>
      <text x="700" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="end">7.5</text>
      <rect x="0" y="20" width="700" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
      <rect x="0" y="20" width="525" height="6" rx="3" fill="url(#amber)"/>
    </g>

    <!-- Bar 5: Top Sellers 7.0 -->
    <g transform="translate(0, 160)">
      <text x="0" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Top Sellers</text>
      <text x="700" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="end">7.0</text>
