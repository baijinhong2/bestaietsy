    <text x="0" y="0" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="#fbbf24" letter-spacing="0.5">eRank Review 2026</text>
    <text x="0" y="56" font-family="-apple-system, system-ui, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Is It Still the Best</text>
    <text x="0" y="110" font-family="-apple-system, system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#amber)" letter-spacing="-1" filter="url(#glow)">Etsy SEO Tool?</text>
