    <path d="M0 100 L300 100 L300 200 L600 200 L600 100 L900 100 L900 300 L1200 300"/>
    <path d="M0 500 L200 500 L200 400 L500 400 L500 550 L800 550 L800 450 L1200 450"/>
    <circle cx="300" cy="200" r="3" fill="#f59e0b"/>
    <circle cx="600" cy="100" r="3" fill="#f59e0b"/>
    <circle cx="900" cy="300" r="3" fill="#f59e0b"/>
    <circle cx="200" cy="400" r="3" fill="#f59e0b"/>
    <circle cx="500" cy="550" r="3" fill="#f59e0b"/>
    <circle cx="800" cy="450" r="3" fill="#f59e0b"/>
  </g>

  <!-- Top eyebrow row -->
  <g transform="translate(60, 50)">
    <!-- 30-day test badge -->
    <rect x="0" y="0" width="180" height="36" rx="18" fill="#f59e0b"/>
    <text x="90" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1a1147" text-anchor="middle" letter-spacing="1.5">30-DAY HONEST TEST</text>

    <!-- Date + version -->
    <rect x="195" y="0" width="120" height="36" rx="18" fill="none" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="255" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fcd34d" text-anchor="middle">JULY 2026</text>

    <!-- Type badge -->
    <rect x="330" y="0" width="140" height="36" rx="18" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <text x="400" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">T2 TOOL REVIEW</text>
  </g>

  <!-- Brand mark + URL top-right -->
  <g transform="translate(1140, 50)">
    <text x="0" y="18" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fcd34d" text-anchor="end" letter-spacing="1">bestaietsy.com</text>
    <text x="0" y="36" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#fcd34d" opacity="0.7" text-anchor="end" letter-spacing="0.5">ETSY AI TOOLS · 2026</text>
