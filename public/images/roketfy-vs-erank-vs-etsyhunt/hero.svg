<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fafafa"/>

  <!-- Decorative top bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#FF6B35"/>
  <rect x="0" y="624" width="1200" height="6" fill="#1E88E5"/>

  <!-- Eyebrow tag -->
  <g transform="translate(600, 60)">
    <rect x="-90" y="-22" width="180" height="40" rx="20" fill="#1E88E5" opacity="0.1"/>
    <text x="0" y="6" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E88E5">2026 COMPARISON</text>
  </g>

  <!-- Main title -->
  <text x="600" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="800" fill="#1a1a1a">
    Roketfy vs eRank vs EtsyHunt
  </text>

  <!-- Subtitle -->
  <text x="600" y="195" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#555">
    Honest Comparison After Testing All Three
  </text>

  <!-- ============ Three tool cards ============ -->

  <!-- Card 1: Roketfy -->
  <g transform="translate(80, 270)">
    <rect x="0" y="0" width="280" height="270" rx="16" fill="white" stroke="#FF6B35" stroke-width="2.5"/>
    <!-- Real Roketfy logo (259x72 aspect = 3.6:1, scale to 220x61) -->
    <image x="30" y="50" width="220" height="61" xlink:href="/Users/Zhuanz/Documents/project/bestaietsy/public/images/tools/roketfy-logo.svg"/>
    <!-- Tagline -->
    <text x="140" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#666">AI Listing Writer</text>
    <line x1="30" y1="180" x2="250" y2="180" stroke="#eee"/>
    <text x="140" y="215" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#555">Starting price</text>
    <text x="140" y="245" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#FF6B35">$5.99/mo</text>
  </g>

  <!-- VS marker -->
  <g transform="translate(395, 395)">
    <circle cx="0" cy="0" r="30" fill="#1a1a1a"/>
    <text x="0" y="8" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="white">VS</text>
  </g>

  <!-- Card 2: eRank -->
  <g transform="translate(460, 270)">
    <rect x="0" y="0" width="280" height="270" rx="16" fill="white" stroke="#1E88E5" stroke-width="2.5"/>
    <!-- Real eRank logo (101x57 aspect = 1.77:1, scale to 200x113) -->
    <image x="40" y="55" width="200" height="113" xlink:href="/Users/Zhuanz/Documents/project/bestaietsy/public/images/tools/erank-logo.svg"/>
    <text x="140" y="195" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#666">Keyword Research</text>
    <line x1="30" y1="210" x2="250" y2="210" stroke="#eee"/>
    <text x="140" y="245" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#1E88E5">FREE</text>
  </g>

  <!-- VS marker -->
  <g transform="translate(775, 395)">
    <circle cx="0" cy="0" r="30" fill="#1a1a1a"/>
    <text x="0" y="8" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="white">VS</text>
  </g>

  <!-- Card 3: EtsyHunt -->
  <g transform="translate(840, 270)">
    <rect x="0" y="0" width="280" height="270" rx="16" fill="white" stroke="#E53935" stroke-width="2.5"/>
    <!-- Real EtsyHunt favicon (256x256 square, scale to 90x90) -->
    <image x="95" y="35" width="90" height="90" xlink:href="/Users/Zhuanz/Documents/project/bestaietsy/public/images/tools/etsyhunt-favicon-256.png"/>
    <!-- EtsyHunt text wordmark (no SVG, render text) -->
    <text x="140" y="160" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#1a1a1a">EtsyHunt</text>
    <text x="140" y="185" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" fill="#666">Product Research</text>
    <line x1="30" y1="205" x2="250" y2="205" stroke="#eee"/>
    <text x="140" y="230" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#555">Starting price</text>
    <text x="140" y="255" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#E53935">$3.99/mo</text>
  </g>

  <!-- Footer brand -->
  <text x="600" y="590" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#888">
    bestaietsy.com · tested independently · 14-day review
  </text>
</svg>