<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <!-- Background card -->
  <rect width="200" height="160" rx="16" fill="#FFFCF7" stroke="#E4CDB4" stroke-width="2"/>

  <!-- Gear (large, center) -->
  <g transform="translate(100, 80)">
    <!-- Gear teeth -->
    <g fill="#F1641E" stroke="#D8500F" stroke-width="2">
      <rect x="-6" y="-50" width="12" height="14" rx="2"/>
      <rect x="-6" y="36" width="12" height="14" rx="2"/>
      <rect x="-50" y="-6" width="14" height="12" rx="2"/>
      <rect x="36" y="-6" width="14" height="12" rx="2"/>
      <rect x="-42" y="-42" width="12" height="12" rx="2" transform="rotate(45)"/>
      <rect x="-42" y="30" width="12" height="12" rx="2" transform="rotate(-45)"/>
      <rect x="30" y="-42" width="12" height="12" rx="2" transform="rotate(-45)"/>
      <rect x="30" y="30" width="12" height="12" rx="2" transform="rotate(45)"/>
    </g>
    <!-- Gear body -->
    <circle cx="0" cy="0" r="38" fill="#F1641E" stroke="#D8500F" stroke-width="2"/>
    <circle cx="0" cy="0" r="14" fill="#FFFCF7" stroke="#D8500F" stroke-width="2"/>
  </g>

  <!-- Stars row at top -->
  <g transform="translate(100, 24)">
    <path d="M -36 0 L -32 -8 L -28 0 L -20 1 L -26 7 L -24 15 L -32 11 L -40 15 L -38 7 L -44 1 Z" fill="#E8C04D"/>
    <path d="M -12 0 L -8 -8 L -4 0 L 4 1 L -2 7 L 0 15 L -8 11 L -16 15 L -14 7 L -20 1 Z" fill="#E8C04D"/>
    <path d="M 12 0 L 16 -8 L 20 0 L 28 1 L 22 7 L 24 15 L 16 11 L 8 15 L 10 7 L 4 1 Z" fill="#E8C04D"/>
    <path d="M 36 0 L 40 -8 L 44 0 L 52 1 L 46 7 L 48 15 L 40 11 L 32 15 L 34 7 L 28 1 Z" fill="#B88A1F" opacity="0.6"/>
  </g>

  <!-- Thumbs up icon (bottom left) -->
  <g transform="translate(30, 130)">
    <path d="M 0 16 L 0 6 L 6 6 L 6 16 Z" fill="#F1641E"/>
    <path d="M 6 6 L 6 0 L 12 -10 L 16 -10 L 14 -2 L 22 -2 C 24 -2 26 0 26 2 L 24 14 C 24 16 22 18 20 18 L 6 18 Z" fill="#F1641E" stroke="#D8500F" stroke-width="1"/>
  </g>

  <!-- Verified check badge (bottom right) -->
  <g transform="translate(170, 130)">
    <circle cx="0" cy="0" r="18" fill="#3D7052" stroke="#234431" stroke-width="2"/>
    <path d="M -7 0 L -2 5 L 7 -5" stroke="#FFFCF7" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>