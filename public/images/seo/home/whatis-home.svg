<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <!-- Background card -->
  <rect width="200" height="160" rx="16" fill="#FFFCF7" stroke="#E4CDB4" stroke-width="2"/>

  <!-- Desk surface -->
  <rect x="0" y="110" width="200" height="50" fill="#FFF8EC"/>

  <!-- Laptop -->
  <rect x="50" y="60" width="80" height="50" rx="3" fill="#3E2815"/>
  <rect x="54" y="64" width="72" height="42" rx="1" fill="#FFFCF7"/>
  <!-- Screen content -->
  <rect x="58" y="68" width="40" height="4" fill="#F1641E"/>
  <rect x="58" y="76" width="64" height="3" fill="#E4CDB4"/>
  <rect x="58" y="82" width="56" height="3" fill="#E4CDB4"/>
  <rect x="58" y="88" width="48" height="3" fill="#E4CDB4"/>
  <circle cx="64" cy="98" r="3" fill="#3D7052"/>
  <rect x="70" y="96" width="40" height="4" fill="#F1641E" opacity="0.3"/>
  <!-- Laptop base -->
  <path d="M 40 110 L 140 110 L 135 116 L 45 116 Z" fill="#3E2815"/>

  <!-- Floating AI sparkle (top right) -->
  <g transform="translate(140, 30)">
    <circle cx="0" cy="0" r="14" fill="#FFE5D4"/>
    <path d="M 0 -10 L 0 10 M -10 0 L 10 0 M -7 -7 L 7 7 M -7 7 L 7 -7" stroke="#F1641E" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Floating tag (left) -->
  <g transform="translate(20, 50) rotate(-12)">
    <path d="M 0 0 L 28 0 L 36 8 L 36 22 L 0 22 Z" fill="#E8C04D" stroke="#B88A1F" stroke-width="1"/>
    <circle cx="30" cy="6" r="2" fill="#FFF8EC"/>
  </g>

  <!-- Coffee mug (bottom right) -->
  <g transform="translate(150, 100)">
    <path d="M 0 0 L 24 0 L 22 22 L 2 22 Z" fill="#F1641E"/>
    <path d="M 24 4 Q 30 4 30 10 Q 30 16 24 16" fill="none" stroke="#F1641E" stroke-width="2"/>
    <ellipse cx="12" cy="2" rx="10" ry="2" fill="#3E2815"/>
    <!-- Steam -->
    <path d="M 8 -4 Q 10 -8 8 -12 M 14 -4 Q 16 -8 14 -12" stroke="#A37545" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Plant (bottom left) -->
  <g transform="translate(15, 100)">
    <path d="M 0 20 L 22 20 L 18 38 L 4 38 Z" fill="#8B5E36"/>
    <path d="M 11 20 C 4 18 2 10 4 6 C 8 8 11 14 11 20 Z" fill="#3D7052"/>
    <path d="M 11 20 C 18 16 20 8 16 4 C 12 8 11 14 11 20 Z" fill="#7DAB89"/>
  </g>
</svg>