<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <!-- Background card -->
  <rect width="200" height="160" rx="16" fill="#FFFCF7" stroke="#E4CDB4" stroke-width="2"/>

  <!-- Central decision hub -->
  <g transform="translate(100, 80)">
    <circle cx="0" cy="0" r="22" fill="#F1641E" stroke="#D8500F" stroke-width="2"/>
    <path d="M -8 -6 L 8 -6 M -8 0 L 8 0 M -8 6 L 4 6" stroke="#FFFCF7" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Branch 1: vintage (top-left) -->
  <g>
    <path d="M 80 80 Q 50 80 40 50 L 25 30" fill="none" stroke="#F1641E" stroke-width="2" stroke-dasharray="4 3"/>
    <!-- Vintage camera icon at end -->
    <g transform="translate(15, 25)">
      <rect x="0" y="0" width="20" height="14" rx="2" fill="#A37545"/>
      <rect x="5" y="-3" width="8" height="3" rx="1" fill="#A37545"/>
      <circle cx="10" cy="7" r="4" fill="#FFFCF7" stroke="#3E2815" stroke-width="0.5"/>
      <circle cx="10" cy="7" r="2" fill="#3E2815"/>
    </g>
    <text x="15" y="55" font-family="sans-serif" font-size="8" fill="#3E2815" font-weight="bold">Vintage</text>
  </g>

  <!-- Branch 2: POD (top-right) -->
  <g>
    <path d="M 120 80 Q 150 80 160 50 L 175 30" fill="none" stroke="#F1641E" stroke-width="2" stroke-dasharray="4 3"/>
    <!-- T-shirt icon -->
    <g transform="translate(168, 22)">
      <path d="M 0 4 L 4 0 L 8 2 L 12 0 L 16 4 L 14 8 L 13 22 L 3 22 L 3 8 Z" fill="#F1641E" stroke="#D8500F" stroke-width="1"/>
    </g>
    <text x="155" y="55" font-family="sans-serif" font-size="8" fill="#3E2815" font-weight="bold">POD</text>
  </g>

  <!-- Branch 3: jewelry (bottom-left) -->
  <g>
    <path d="M 80 80 Q 50 80 40 110 L 25 130" fill="none" stroke="#F1641E" stroke-width="2" stroke-dasharray="4 3"/>
    <!-- Gem icon -->
    <g transform="translate(15, 125)">
      <path d="M 10 0 L 18 6 L 14 18 L 6 18 L 2 6 Z" fill="#E8C04D" stroke="#B88A1F" stroke-width="1"/>
      <path d="M 2 6 L 18 6 L 14 18 L 6 18 Z" fill="#F1641E" opacity="0.5"/>
    </g>
    <text x="15" y="115" font-family="sans-serif" font-size="8" fill="#3E2815" font-weight="bold">Jewelry</text>
  </g>

  <!-- Branch 4: digital (bottom-right) -->
  <g>
    <path d="M 120 80 Q 150 80 160 110 L 175 130" fill="none" stroke="#F1641E" stroke-width="2" stroke-dasharray="4 3"/>
    <!-- Download icon -->
    <g transform="translate(168, 122)">
      <rect x="0" y="0" width="20" height="14" rx="2" fill="#FFF8EC" stroke="#3E2815" stroke-width="1"/>
      <path d="M 10 3 L 10 10 M 7 8 L 10 11 L 13 8" stroke="#F1641E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="148" y="115" font-family="sans-serif" font-size="8" fill="#3E2815" font-weight="bold">Digital</text>
  </g>

  <!-- Title at top -->
  <text x="100" y="20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3E2815" font-weight="bold">Your shop type?</text>
</svg>