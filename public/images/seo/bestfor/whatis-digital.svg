<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="16" fill="#FFFCF7" stroke="#E4CDB4" stroke-width="2"/>

  <text x="100" y="22" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3E2815" font-weight="bold">Digital download tools</text>

  <!-- Download arrow (top) -->
  <g transform="translate(85, 30)">
    <rect x="0" y="0" width="30" height="22" rx="3" fill="#FFFCF7" stroke="#3E2815" stroke-width="1.5"/>
    <path d="M 15 4 L 15 14" stroke="#F1641E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 10 11 L 15 16 L 20 11" stroke="#F1641E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="6" y1="20" x2="24" y2="20" stroke="#3E2815" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <path d="M 100 65 L 100 73" stroke="#F1641E" stroke-width="2" stroke-dasharray="3 2"/>

  <!-- Simplified -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#7C3AED"/>
    <path d="M 10 14 L 16 10 L 22 14 L 26 12 L 30 16 L 26 24 L 20 28 L 14 22 Z" fill="none" stroke="#FFFCF7" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="20" cy="18" r="3" fill="#FFFCF7"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">Simplified</text>
  </g>

  <!-- Originality.ai (blue O with shield) -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#1E40AF"/>
    <path d="M 20 8 L 28 14 L 26 24 L 20 30 L 14 24 L 12 14 Z" fill="none" stroke="#FFFCF7" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 16 18 L 19 22 L 24 16" stroke="#FFFCF7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">Originality</text>
  </g>

  <!-- Roketfy -->
  <g transform="translate(140, 80)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#F1641E"/>
    <path d="M 20 12 L 26 22 L 20 18 L 14 22 Z" fill="#FFFCF7"/>
    <circle cx="20" cy="14" r="2" fill="#FFFCF7"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">Roketfy</text>
  </g>

  <text x="100" y="155" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#8B5E36" font-style="italic">draft → verify → ship</text>
</svg>