<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="16" fill="#FFFCF7" stroke="#E4CDB4" stroke-width="2"/>

  <text x="100" y="22" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3E2815" font-weight="bold">Handmade AI tools</text>

  <!-- Yarn ball (top) -->
  <g transform="translate(85, 32)">
    <circle cx="15" cy="15" r="13" fill="#E8C04D" stroke="#B88A1F" stroke-width="1.5"/>
    <path d="M 5 12 Q 10 8 15 12 M 5 18 Q 10 14 15 18 M 9 5 Q 14 10 9 15 M 14 8 Q 19 13 14 18" stroke="#B88A1F" stroke-width="1" fill="none"/>
    <path d="M 8 10 L 22 20 M 8 20 L 22 10" stroke="#A37545" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <path d="M 100 65 L 100 73" stroke="#F1641E" stroke-width="2" stroke-dasharray="3 2"/>

  <!-- Roketfy -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#F1641E"/>
    <path d="M 20 12 L 26 22 L 20 18 L 14 22 Z" fill="#FFFCF7"/>
    <circle cx="20" cy="14" r="2" fill="#FFFCF7"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">Roketfy</text>
  </g>

  <!-- eRank -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#0EA5E9"/>
    <circle cx="17" cy="17" r="8" fill="none" stroke="#FFFCF7" stroke-width="2.5"/>
    <line x1="22" y1="22" x2="28" y2="28" stroke="#FFFCF7" stroke-width="2.5" stroke-linecap="round"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">eRank</text>
  </g>

  <!-- Simplified -->
  <g transform="translate(140, 80)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#7C3AED"/>
    <path d="M 10 14 L 16 10 L 22 14 L 26 12 L 30 16 L 26 24 L 20 28 L 14 22 Z" fill="none" stroke="#FFFCF7" stroke-width="1.5" stroke-linejoin="round"/>
