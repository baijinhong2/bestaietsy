<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="16" fill="#FFFCF7" stroke="#E4CDB4" stroke-width="2"/>

  <!-- Title -->
  <text x="100" y="22" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3E2815" font-weight="bold">Vintage AI tools</text>

  <!-- Vintage clock (top) -->
  <g transform="translate(85, 35)">
    <circle cx="15" cy="15" r="14" fill="#A37545" stroke="#3E2815" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="11" fill="#FFFCF7"/>
    <line x1="15" y1="15" x2="15" y2="8" stroke="#3E2815" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="15" x2="20" y2="17" stroke="#3E2815" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="15" cy="15" r="1.5" fill="#3E2815"/>
    <circle cx="15" cy="4" r="1" fill="#A37545"/>
    <circle cx="26" cy="15" r="1" fill="#A37545"/>
    <circle cx="15" cy="26" r="1" fill="#A37545"/>
    <circle cx="4" cy="15" r="1" fill="#A37545"/>
  </g>

  <!-- Arrow: title to tools -->
  <path d="M 100 70 L 100 78" stroke="#F1641E" stroke-width="2" stroke-dasharray="3 2"/>

  <!-- Tool icons row -->
  <!-- Roketfy (orange rocket) -->
  <g transform="translate(20, 85)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#F1641E"/>
    <path d="M 20 12 L 26 22 L 20 18 L 14 22 Z" fill="#FFFCF7"/>
    <circle cx="20" cy="14" r="2" fill="#FFFCF7"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">Roketfy</text>
  </g>

  <!-- eRank (blue magnifier) -->
  <g transform="translate(80, 85)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#0EA5E9"/>
    <circle cx="17" cy="17" r="8" fill="none" stroke="#FFFCF7" stroke-width="2.5"/>
    <line x1="22" y1="22" x2="28" y2="28" stroke="#FFFCF7" stroke-width="2.5" stroke-linecap="round"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">eRank</text>
  </g>

  <!-- EtsyHunt (orange M) -->
  <g transform="translate(140, 85)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#F97316"/>
    <path d="M 8 28 L 12 12 L 20 24 L 28 12 L 32 28" stroke="#FFFCF7" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">EtsyHunt</text>
  </g>

  <!-- Bottom note -->
  <text x="100" y="155" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#8B5E36" font-style="italic">era-aware AI · no image generators</text>
</svg>