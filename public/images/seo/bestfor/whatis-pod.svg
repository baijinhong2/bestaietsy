<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <rect width="200" height="160" rx="16" fill="#FFFCF7" stroke="#E4CDB4" stroke-width="2"/>

  <text x="100" y="22" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3E2815" font-weight="bold">POD AI tools</text>

  <!-- T-shirt (top) -->
  <g transform="translate(80, 32)">
    <path d="M 10 4 L 16 0 L 24 0 L 26 4 L 30 4 L 32 8 L 30 14 L 26 12 L 26 32 L 14 32 L 14 12 L 10 14 L 8 8 Z"
          fill="#F1641E" stroke="#D8500F" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 16 0 L 20 4 L 24 0" fill="none" stroke="#FFFCF7" stroke-width="1.5"/>
  </g>

  <path d="M 100 70 L 100 78" stroke="#F1641E" stroke-width="2" stroke-dasharray="3 2"/>

  <!-- Midjourney (sailboat) -->
  <g transform="translate(15, 85)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#1F2937"/>
    <path d="M 14 26 L 22 12 L 22 26 Z M 22 12 L 22 26 L 30 26 L 30 18" fill="none" stroke="#FFFCF7" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 8 30 L 32 30 L 30 33 L 10 33 Z" fill="#FFFCF7"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">Midjourney</text>
  </g>

  <!-- Roketfy -->
  <g transform="translate(65, 85)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#F1641E"/>
    <path d="M 20 12 L 26 22 L 20 18 L 14 22 Z" fill="#FFFCF7"/>
    <circle cx="20" cy="14" r="2" fill="#FFFCF7"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">Roketfy</text>
  </g>

  <!-- eRank -->
  <g transform="translate(115, 85)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#0EA5E9"/>
    <circle cx="17" cy="17" r="8" fill="none" stroke="#FFFCF7" stroke-width="2.5"/>
    <line x1="22" y1="22" x2="28" y2="28" stroke="#FFFCF7" stroke-width="2.5" stroke-linecap="round"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">eRank</text>
  </g>

  <!-- Simplified -->
  <g transform="translate(160, 85)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#7C3AED"/>
    <path d="M 10 14 L 16 10 L 22 14 L 26 12 L 30 16 L 26 24 L 20 28 L 14 22 Z" fill="none" stroke="#FFFCF7" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="20" cy="18" r="3" fill="#FFFCF7"/>
    <text x="20" y="58" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3E2815" font-weight="bold">Simplified</text>
  </g>

  <text x="100" y="155" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#8B5E36" font-style="italic">design + bulk list + keywords</text>
</svg>