<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Etsy AI Content Authenticity Policy 2026 hero — 5 things every seller must do, 12,000 listings removed in one quarter, 4-tool compliance stack">
  <defs>
