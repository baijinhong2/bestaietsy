      <text x="120" y="22" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#1a1147">Roketfy</text>
      <text x="120" y="40" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="500" fill="#0c4a6e">Compliance scan</text>
      <text x="120" y="54" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="500" fill="#075985">30% lifetime</text>
