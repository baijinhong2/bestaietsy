<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#2d1b5e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid pattern (subtle) -->
  <g opacity="0.08" stroke="#a78bfa" stroke-width="1" fill="none">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Central question mark (large) -->
  <g transform="translate(600, 280)">
    <circle cx="0" cy="0" r="120" fill="#fbbf24" opacity="0.15"/>
    <text x="0" y="40" font-family="-apple-system, system-ui, sans-serif" font-size="180" font-weight="900" fill="url(#accent)" text-anchor="middle">?</text>
  </g>

  <!-- Title (top) -->
  <text x="600" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="48" font-weight="800" fill="#ffffff" text-anchor="middle">Is AI Allowed on Etsy 2026?</text>
  <text x="600" y="145" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="500" fill="#a78bfa" text-anchor="middle">Honest FAQ for Sellers · 7 Critical Questions Answered</text>

  <!-- 7 Q&A dot indicators (bottom left) -->
  <g transform="translate(80, 470)">
    <text x="0" y="0" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24">7 FAQs</text>
    <g transform="translate(0, 25)" fill="#fbbf24">
      <circle cx="0" cy="0" r="6"/>
      <circle cx="22" cy="0" r="6"/>
      <circle cx="44" cy="0" r="6"/>
      <circle cx="66" cy="0" r="6"/>
      <circle cx="88" cy="0" r="6"/>
      <circle cx="110" cy="0" r="6"/>
      <circle cx="132" cy="0" r="6"/>
    </g>
  </g>

  <!-- Policy tags (bottom right) -->
  <g transform="translate(1200, 470)" text-anchor="end" font-family="-apple-system, system-ui, sans-serif">
    <text x="0" y="0" font-size="14" font-weight="600" fill="#34d399">2026 COMPLIANT</text>
    <g transform="translate(0, 25)">
      <rect x="-90" y="-14" width="90" height="22" rx="11" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="1"/>
      <text x="-45" y="2" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">AI DISCLOSURE</text>
      <rect x="-185" y="-14" width="90" height="22" rx="11" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="1"/>
      <text x="-140" y="2" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">6/2 + 8/11</text>
    </g>
  </g>

  <!-- AI circuit decoration (left side) -->
  <g stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M 60 250 L 100 250 L 100 290 L 140 290"/>
    <circle cx="60" cy="250" r="3" fill="#a78bfa"/>
    <circle cx="140" cy="290" r="3" fill="#a78bfa"/>
    <path d="M 60 350 L 100 350 L 100 380"/>
    <circle cx="60" cy="350" r="3" fill="#a78bfa"/>
  </g>

  <!-- AI circuit decoration (right side) -->
  <g stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M 1140 250 L 1100 250 L 1100 290 L 1060 290"/>
    <circle cx="1140" cy="250" r="3" fill="#a78bfa"/>
    <circle cx="1060" cy="290" r="3" fill="#a78bfa"/>
    <path d="M 1140 350 L 1100 350 L 1100 380"/>
    <circle cx="1140" cy="350" r="3" fill="#a78bfa"/>
  </g>

  <!-- Brand line (bottom) -->
  <text x="600" y="595" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#a78bfa" text-anchor="middle" opacity="0.7">bestaietsy.com · Etsy AI Compliance FAQ</text>
</svg>
