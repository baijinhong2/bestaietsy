<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="aiSparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A4A"/>
      <stop offset="100%" stop-color="#F1641E"/>
    </linearGradient>
  </defs>

  <!-- Wordmark: "bestaietsy" -->
  <g font-family="'Playfair Display', Georgia, serif" font-weight="900">
    <!-- "best" -->
    <text x="0" y="58" font-size="48" fill="#1C1917">best</text>

    <!-- "ai" highlighted -->
    <text x="100" y="58" font-size="48" fill="#F1641E" font-style="italic">ai</text>

    <!-- "etsy" -->
    <text x="148" y="58" font-size="48" fill="#1C1917">etsy</text>

    <!-- AI sparkle (top, above "ai") -->
    <g transform="translate(135, 8)" fill="url(#aiSparkle)">
      <path d="M 0 -10 L 2 -2 L 10 0 L 2 2 L 0 10 L -2 2 L -10 0 L -2 -2 Z"/>
    </g>
  </g>

  <!-- Tagline (subtle, below) -->
  <text x="0" y="76" font-family="'Inter', -apple-system, sans-serif"
        font-size="11" font-weight="500" fill="#78716C" letter-spacing="1.5">
    THE AI TOOLKIT FOR ETSY SELLERS
  </text>
</svg>