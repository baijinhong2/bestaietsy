<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Brand orange background gradient (matches email header) -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A4A"/>
      <stop offset="100%" stop-color="#D8500F"/>
    </linearGradient>
    <!-- Cream flame gradient (same as email flame) -->
    <linearGradient id="iconOuter" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#FFE5D4"/>
      <stop offset="100%" stop-color="#FFFCF7"/>
    </linearGradient>
    <!-- Inner flame: warmer cream -->
    <linearGradient id="iconInner" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#FFE5A0"/>
      <stop offset="100%" stop-color="#FFFCF7"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND: brand orange rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#iconBg)"/>

  <!-- MARK: cream flame on orange (high contrast) -->
  <g transform="translate(10, 4)">
    <!-- Outer flame: cream gradient -->
    <path d="M 22 4
             C 19 10 15 14 14 20
             C 12 25 8 26 8 32
             C 8 39 14 45 22 45
             C 30 45 36 39 36 32
             C 36 26 32 25 30 20
             C 29 14 25 10 22 4 Z"
          fill="url(#iconOuter)"/>
    <!-- Inner flame: warmer cream/yellow -->
    <path d="M 22 17
             C 21 21 18 24 18 28
             C 18 33 20 38 22 38
             C 24 38 26 33 26 28
             C 26 24 23 21 22 17 Z"
          fill="url(#iconInner)" opacity="0.95"/>
    <!-- Spark: deeper orange (contrasts against cream flame) -->
    <path d="M 30 10
             L 31 12.5
             L 33.5 13.5
             L 31 14.5
             L 30 17
             L 29 14.5
             L 26.5 13.5
             L 29 12.5 Z"
          fill="#D8500F"/>
  </g>
</svg>